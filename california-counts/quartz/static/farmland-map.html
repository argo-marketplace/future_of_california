<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>California Farmland Change 1984-2022</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Source Sans Pro", -apple-system, BlinkMacSystemFont, sans-serif;
    background: transparent;
  }
  #farmland-map {
    width: 100%;
    height: 500px;
    border: 1px solid #ccc;
    border-radius: 4px 4px 0 0;
    background: #e8e8e8;
  }
  .map-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: #f5f5f5;
    border: 1px solid #ccc;
    border-top: none;
    flex-wrap: wrap;
  }
  .map-controls button {
    background: #1a3a5c;
    color: white;
    border: none;
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    white-space: nowrap;
  }
  .map-controls button:hover {
    background: #254d75;
  }
  #year-slider {
    flex: 1;
    min-width: 120px;
    cursor: pointer;
  }
  #year-display {
    font-size: 1.3rem;
    font-weight: bold;
    font-family: "IBM Plex Mono", monospace;
    color: #1a3a5c;
    min-width: 50px;
    text-align: center;
  }
  #speed-select {
    padding: 4px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 13px;
    background: white;
  }
  .map-legend {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 4px 16px;
    padding: 10px 14px;
    background: #fafafa;
    border: 1px solid #ccc;
    border-top: none;
    border-radius: 0 0 4px 4px;
    font-size: 13px;
  }
  .map-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border: 1px solid #999;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .map-loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.85);
    padding: 8px 18px;
    border-radius: 4px;
    font-size: 14px;
    z-index: 1000;
    pointer-events: none;
    display: none;
  }
  @media (max-width: 600px) {
    #farmland-map { height: 350px; }
    .map-legend { grid-template-columns: 1fr 1fr; font-size: 12px; }
    .map-controls { gap: 8px; padding: 8px 10px; }
  }
</style>
</head>
<body>
  <div style="position: relative;">
    <div id="farmland-map"></div>
    <div class="map-loading" id="map-loading">Loading...</div>
  </div>
  <div class="map-controls">
    <button id="play-btn">&#9654; Play</button>
    <input type="range" id="year-slider" min="0" max="19" value="0" />
    <span id="year-display">1984</span>
    <select id="speed-select">
      <option value="2500">Slow</option>
      <option value="1500" selected>Medium</option>
      <option value="800">Fast</option>
    </select>
  </div>
  <div class="map-legend">
    <div class="map-legend-item"><span class="legend-swatch" style="background:#004DA8;"></span> Prime Farmland</div>
    <div class="map-legend-item"><span class="legend-swatch" style="background:#267300;"></span> Farmland of Statewide Importance</div>
    <div class="map-legend-item"><span class="legend-swatch" style="background:#ED7215;"></span> Unique Farmland</div>
    <div class="map-legend-item"><span class="legend-swatch" style="background:#FFFF00;"></span> Farmland of Local Importance</div>
    <div class="map-legend-item"><span class="legend-swatch" style="background:#E1CC8A;"></span> Grazing Land</div>
    <div class="map-legend-item"><span class="legend-swatch" style="background:#ED0000;"></span> Urban and Built-Up Land</div>
    <div class="map-legend-item"><span class="legend-swatch" style="background:#CDCDB4;"></span> Other Land</div>
    <div class="map-legend-item"><span class="legend-swatch" style="background:#4EC5E8;"></span> Water</div>
  </div>

<script>
(function() {
  var years = [1984,1986,1988,1990,1992,1994,1996,1998,
               2000,2002,2004,2006,2008,2010,2012,2014,2016,2018,2020,2022];
  var currentIndex = 0;
  var animationTimer = null;
  var currentLayer = null;
  var animationSpeed = 1500;

  var map = L.map('farmland-map', {
    center: [37.2, -119.5],
    zoom: 6,
    minZoom: 5,
    maxZoom: 14
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  var loadingEl = document.getElementById('map-loading');
  var yearDisplay = document.getElementById('year-display');
  var slider = document.getElementById('year-slider');
  var playBtn = document.getElementById('play-btn');
  var speedSelect = document.getElementById('speed-select');

  function showYear(index) {
    if (index < 0 || index >= years.length) return;
    currentIndex = index;
    var year = years[index];
    var url = 'https://gis.conservation.ca.gov/server/rest/services/DLRP/CaliforniaImportantFarmland_' + year + '/MapServer';

    if (currentLayer) {
      map.removeLayer(currentLayer);
    }

    loadingEl.style.display = 'block';
    loadingEl.textContent = 'Loading...';

    currentLayer = L.esri.dynamicMapLayer({
      url: url,
      opacity: 0.7,
      useCors: true
    }).addTo(map);

    currentLayer.on('load', function() {
      loadingEl.style.display = 'none';
    });

    currentLayer.on('requesterror', function() {
      loadingEl.textContent = year + ' data unavailable';
      loadingEl.style.display = 'block';
      setTimeout(function() {
        loadingEl.style.display = 'none';
        loadingEl.textContent = 'Loading...';
      }, 1500);
    });

    yearDisplay.textContent = year;
    slider.value = index;
  }

  function toggleAnimation() {
    if (animationTimer) {
      clearInterval(animationTimer);
      animationTimer = null;
      playBtn.innerHTML = '&#9654; Play';
    } else {
      animationTimer = setInterval(function() {
        currentIndex = (currentIndex + 1) % years.length;
        showYear(currentIndex);
      }, animationSpeed);
      playBtn.innerHTML = '&#9646;&#9646; Pause';
    }
  }

  playBtn.addEventListener('click', toggleAnimation);

  slider.addEventListener('input', function() {
    if (animationTimer) {
      clearInterval(animationTimer);
      animationTimer = null;
      playBtn.innerHTML = '&#9654; Play';
    }
    showYear(parseInt(this.value, 10));
  });

  speedSelect.addEventListener('change', function() {
    animationSpeed = parseInt(this.value, 10);
    if (animationTimer) {
      clearInterval(animationTimer);
      animationTimer = setInterval(function() {
        currentIndex = (currentIndex + 1) % years.length;
        showYear(currentIndex);
      }, animationSpeed);
    }
  });

  showYear(0);
})();
</script>
</body>
</html>
