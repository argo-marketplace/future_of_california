name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # --- Build Jekyll (main site) ---
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build --destination ./_site
        env:
          JEKYLL_ENV: production

      # --- Build Quartz (California Counts) ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Quartz dependencies
        working-directory: ./california-counts
        run: npm ci

      - name: Build Quartz site
        working-directory: ./california-counts
        run: npx quartz build

      # --- Combine outputs ---
      - name: Copy Quartz output into Jekyll output
        run: |
          mkdir -p ./_site/california-counts
          cp -r ./california-counts/public/* ./_site/california-counts/

      # --- Deploy ---
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
